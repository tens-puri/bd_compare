<!DOCTYPE html>

<head>

<title>เปรียบเทียบ 3 เวอร์ชัน – DS6805-012</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f2f5;padding:16px;font-size:13px}
.header{background:linear-gradient(135deg,#1a3c6e,#2563a8);color:#fff;border-radius:10px;padding:14px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:16px;font-weight:bold}.header p{font-size:11px;opacity:.85;margin-top:2px}
.hbtn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* Top summary */
.top-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.tcard{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 5px rgba(0,0,0,.09)}
.tcard h3{font-size:12px;margin-bottom:10px;font-weight:bold;padding-bottom:6px;border-bottom:2px solid}
.trow{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.trow .lb{color:#666}.trow .vl{font-weight:bold}
.pbar{height:10px;border-radius:5px;background:#e0e0e0;margin-top:8px;overflow:hidden}
.pfill{height:100%;border-radius:5px}

/* Filter */
.filter-section{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{padding:5px 14px;border-radius:20px;border:2px solid #ddd;cursor:pointer;font-size:12px;font-family:inherit;background:#fff;color:#555;user-select:none}
.chip.on{color:#fff;border-color:transparent}

/* Table */
.sec-wrap{margin-bottom:14px;border-radius:8px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.sec-hdr{color:#fff;font-weight:bold;padding:8px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:820px;background:#fff}
th{padding:6px 8px;border:1px solid #d0d7e2;background:#eef2f8;text-align:left;white-space:nowrap;font-size:11px;color:#334}
th.old{background:#e8edf5;color:#37474f}
th.new{background:#e3f0fb;color:#1565c0}
th.sc{background:#fff3e0;color:#e65100}
th.diff{background:#f3f3f3;color:#555}
td{padding:5px 8px;border:1px solid #e5e9f0;vertical-align:middle}
tr:nth-child(even) td{background:#fafbfd}
.num{text-align:right;white-space:nowrap}
.bold{font-weight:bold}
.plus{color:#c62828;font-weight:bold}.minus{color:#2e7d32;font-weight:bold}.zero{color:#999}
.sub-row td{background:#dde4f0!important;font-weight:bold}
.sc-cell{background:#fff8f0!important;color:#e65100;font-weight:bold}
.new-cell{background:#f0f7ff!important}
.removed-cell{color:#aaa;font-style:italic}

/* Grand summary */
.grand{background:#fff;border:2px solid #1a3c6e;border-radius:10px;padding:16px;margin-top:4px;margin-bottom:16px}
.grand h3{font-size:14px;color:#1a3c6e;font-weight:bold;margin-bottom:12px}
.grand table{min-width:0}
.grand th{font-size:12px}.grand td{font-size:12px}

.legend{background:#fff;border-radius:8px;padding:10px 16px;display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#555;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-top:10px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
@media(max-width:700px){.top-cards{grid-template-columns:1fr}}
</style>
</head>

  s._sc=s.rows.reduce((a,r)=>a+r.sc,0);

const PCT_OLD=P_OLD/REVENUE*100, PCT_NEW=P_NEW/REVENUE*100, PCT_SC=P_SC/REVENUE*100;

    render();
  };
  ce.appendChild(b);
});

function dc(a,b){
  const d=b-a; if(Math.abs(d)<0.01) return '<span class="zero">—</span>';
  return d>0?`<span class="plus">+${fmt(d)}</span>`:`<span class="minus">${fmt(d)}</span>`;
}
function rowStatus(oc,nc){
  if(oc===0&&nc>0) return 'new';
  if(oc>0&&nc===0) return 'removed';
  return 'normal';
}

    </tr></thead><tbody>`;

    s.rows.forEach(r=>{
      const st=rowStatus(r.oc,r.nc);
      const ncDisp=r.nc?fmt(r.nc):(st==='removed'?'<span class="removed-cell">ตัดออก</span>':'-');
      const scDisp=r.sc?`<span class="${s.isHWSW?'affected-num':''}">${fmt(r.sc)}</span>`:(r.nc===0?'<span class="removed-cell">-</span>':fmt(r.sc));
      html+=`<tr>
        <td class="bold">${r.n}${st==='new'?'<span style="color:#6a1b9a;font-size:10px;margin-left:4px">★ใหม่</span>':''}</td>
        <td class="num old-cell">${r.oc?fmt(r.oc):'-'}</td>
        <td class="num ${st==='new'?'new-cell':''}">${ncDisp}</td>
        <td class="num ${s.isHWSW&&r.nc?'sc-cell':''}">${scDisp}</td>
        <td class="num">${dc(r.oc,r.nc)}</td>
        <td class="num">${s.isHWSW&&r.nc?dc(r.nc,r.sc):'<span class="zero">—</span>'}</td>
        <td class="num">${dc(r.oc,r.sc)}</td>
        <td style="font-size:11px;color:#666;min-width:140px">${r.note||''}</td>
      </tr>`;
    });

    html+=`<tr class="sub-row">
      <td style="text-align:right">รวม ${s.label}</td>
      <td class="num">${fmt(s._oc)}</td>
      <td class="num">${fmt(s._nc)}</td>
      <td class="num ${s.isHWSW?'sc-cell':''}">${fmt(s._sc)}</td>
      <td class="num">${dc(s._oc,s._nc)}</td>
      <td class="num">${s.isHWSW?dc(s._nc,s._sc):'<span class="zero">—</span>'}</td>
      <td class="num">${dc(s._oc,s._sc)}</td>
      <td></td>
    </tr></tbody></table></div></div>`;
  });

  // Grand summary
  const vo=vis.reduce((a,s)=>a+s._oc,0);
  const vn=vis.reduce((a,s)=>a+s._nc,0);
  const vs=vis.reduce((a,s)=>a+s._sc,0);
  const pp_o=REVENUE-vo, pp_n=REVENUE-vn, pp_s=REVENUE-vs;
  const pc_o=pp_o/REVENUE*100, pc_n=pp_n/REVENUE*100, pc_s=pp_s/REVENUE*100;
  html+=`<div class="grand">
    <h3>📋 สรุปยอดรวม${vis.length<sections.length?' (เฉพาะหมวดที่แสดง)':''}</h3>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="padding:7px 8px;border:1px solid #dde;text-align:left">รายการ</th>
        <th class="num old" style="padding:7px 8px;border:1px solid #dde">เก่า</th>
        <th class="num new" style="padding:7px 8px;border:1px solid #dde">ver.2</th>
        <th class="num sc" style="padding:7px 8px;border:1px solid #dde">Scenario (+10%)</th>
        <th class="num diff" style="padding:7px 8px;border:1px solid #dde">ver.2 vs เก่า</th>
        <th class="num diff" style="padding:7px 8px;border:1px solid #dde">Scenario vs ver.2</th>
        <th class="num diff" style="padding:7px 8px;border:1px solid #dde">Scenario vs เก่า</th>
      </tr></thead>
      <tbody>
      <tr><td style="padding:6px 8px;border:1px solid #eee;font-weight:bold">ต้นทุนรวม</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:#546e7a">${fmt(vo)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:#1565c0">${fmt(vn)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:#e65100">${fmt(vs)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(vo,vn)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(vn,vs)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(vo,vs)}</td>
      </tr>
      <tr style="background:#fafafa"><td style="padding:6px 8px;border:1px solid #eee;font-weight:bold">ราคาขาย</td>
        <td colspan="3" class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold">${fmt(REVENUE)}</td>
        <td colspan="3" class="num" style="padding:6px 8px;border:1px solid #eee;color:#888">คงเดิมทั้ง 3 เวอร์ชัน</td>
      </tr>
      <tr><td style="padding:6px 8px;border:1px solid #eee;font-weight:bold">กำไร (บาท)</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:#2e7d32">${fmt(pp_o)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:#2e7d32">${fmt(pp_n)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee;font-weight:bold;color:${pp_s>0?'#2e7d32':'#c62828'}">${fmt(pp_s)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(pp_o,pp_n)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(pp_n,pp_s)}</td>
        <td class="num" style="padding:6px 8px;border:1px solid #eee">${dc(pp_o,pp_s)}</td>
      </tr>
      <tr style="background:#f9fbe7"><td style="padding:6px 8px;border:1px solid #dde;font-weight:bold">% กำไร</td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde;font-weight:bold;color:#2e7d32">${pc_o.toFixed(2)}%</td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde;font-weight:bold;color:#2e7d32">${pc_n.toFixed(2)}%</td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde;font-weight:bold;color:${pc_s>0?'#e65100':'#c62828'}">${pc_s.toFixed(2)}%</td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde"><span class="${pc_n>pc_o?'plus':'minus'}">${pc_n>pc_o?'▲':'▼'}${Math.abs(pc_n-pc_o).toFixed(2)}%</span></td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde"><span class="${pc_s>pc_n?'plus':'minus'}">${pc_s>pc_n?'▲':'▼'}${Math.abs(pc_s-pc_n).toFixed(2)}%</span></td>
        <td class="num" style="padding:6px 8px;border:1px solid #dde"><span class="${pc_s>pc_o?'plus':'minus'}">${pc_s>pc_o?'▲':'▼'}${Math.abs(pc_s-pc_o).toFixed(2)}%</span></td>
      </tr>
      <tr style="background:#fff3e0"><td colspan="7" style="padding:8px 10px;border:1px solid #ffe0b2;font-size:12px;color:#e65100">
        💡 หากต้องการรักษา profit ที่ <strong>${pc_n.toFixed(2)}%</strong> (ver.2) เมื่อ HW/SW ขึ้น 10% &nbsp;→&nbsp;
        ราคาขายควรปรับเป็น <strong>${fmt(TARGET_PRICE)}</strong> บาท
        &nbsp;(เพิ่มขึ้น <strong>+${fmt(TARGET_PRICE-REVENUE)}</strong> บาท จากปัจจุบัน)
      </td></tr>
      </tbody>
    </table></div>
  </div>`;
  document.getElementById('tables').innerHTML=html;
}

function exportCSV(){
  let rows=[
    ['เปรียบเทียบ 3 เวอร์ชัน DS6805-012'],
    ['เก่า','DS6805012.pdf (31/01/68)','ver.2','DS6805012 ver.2.pdf (02/04/68)','Scenario','ver.2 + HW/SW +10%'],
    ['ราคาขาย',fmt(REVENUE)],
    [],
    ['','เก่า','ver.2','Scenario (+10%)','ver.2 vs เก่า','Scenario vs ver.2','Scenario vs เก่า'],
    ['ต้นทุนรวม',fmt(T_OLD),fmt(T_NEW),fmt(T_SC),(T_NEW-T_OLD>=0?'+':'')+fmt(T_NEW-T_OLD),(T_SC-T_NEW>=0?'+':'')+fmt(T_SC-T_NEW),(T_SC-T_OLD>=0?'+':'')+fmt(T_SC-T_OLD)],
    ['กำไร (บาท)',fmt(P_OLD),fmt(P_NEW),fmt(P_SC),(P_NEW-P_OLD>=0?'+':'')+fmt(P_NEW-P_OLD),(P_SC-P_NEW>=0?'+':'')+fmt(P_SC-P_NEW),(P_SC-P_OLD>=0?'+':'')+fmt(P_SC-P_OLD)],
    ['% กำไร',PCT_OLD.toFixed(2)+'%',PCT_NEW.toFixed(2)+'%',PCT_SC.toFixed(2)+'%',(PCT_NEW-PCT_OLD>=0?'+':'')+( PCT_NEW-PCT_OLD).toFixed(2)+'%',(PCT_SC-PCT_NEW>=0?'+':'')+(PCT_SC-PCT_NEW).toFixed(2)+'%',(PCT_SC-PCT_OLD>=0?'+':'')+(PCT_SC-PCT_OLD).toFixed(2)+'%'],
    ['ราคาขายที่ควรเป็น (รักษา profit ver.2)','','',fmt(TARGET_PRICE),'','','+'+fmt(TARGET_PRICE-REVENUE)],
    []
  ];
  sections.forEach(s=>{
    rows.push([s.label+(s.isHWSW?' (+10%)':'')]);
    rows.push(['รายการ','สัญญา (เก่า)','สัญญา (ver.2)','สัญญา (Scenario)','ver.2 vs เก่า','Scenario vs ver.2','หมายเหตุ']);
    s.rows.forEach(r=>{
      rows.push([r.n,r.oc||'-',r.nc||'-',fmt(r.sc),(r.nc-r.oc>=0?'+':'')+fmt(r.nc-r.oc),(r.sc-r.nc>=0?'+':'')+fmt(r.sc-r.nc),r.note||'']);
    });
    rows.push([`รวม ${s.label}`,fmt(s._oc),fmt(s._nc),fmt(s._sc),(s._nc-s._oc>=0?'+':'')+fmt(s._nc-s._oc),(s._sc-s._nc>=0?'+':'')+fmt(s._sc-s._nc)]);
    rows.push([]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const b64=btoa(unescape(encodeURIComponent('\uFEFF'+csv)));
  const a=document.createElement('a');a.href='data:text/csv;base64,'+b64;
  a.download='Compare_3Version_DS6805-012.csv';a.click();
}

render();
</script>
